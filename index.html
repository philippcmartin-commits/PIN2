<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIN</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video
      id="bg-video"
      class="bg-video"
      autoplay
      loop
      playsinline
      preload="auto"
    >
      <source src="pin-video.mp4" type="video/mp4" />
    </video>

    <div id="video-fallback" class="video-fallback hidden">
      VIDEO FAILED TO LOAD. MAKE SURE <code>pin-video.mp4</code> IS IN THE SAME
      FOLDER AS <code>index.html</code>.
    </div>

    <aside class="side-controls" aria-label="Playback controls">
      <button id="float-toggle" class="side-button" type="button">
        FLOAT MODE: OFF
      </button>
    </aside>

    <div id="audio-gate" class="audio-gate hidden">
      <div class="audio-card">
        <p class="audio-label">AUTOPLAY BLOCKED</p>
        <button id="audio-unlock" class="audio-button" type="button">
          TAP FOR SOUND
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
