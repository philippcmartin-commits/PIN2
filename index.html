<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PIN.exe // IMPACT MODE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="video-shell">
      <video
        id="bg-video"
        class="bg-video"
        autoplay
        loop
        playsinline
        preload="auto"
      >
        <source src="pin-video.mp4" type="video/mp4" />
      </video>

      <video
        id="fx-video"
        class="fx-video"
        loop
        playsinline
        preload="auto"
        aria-hidden="true"
      >
        <source src="videoplayback (1).mp4" type="video/mp4" />
      </video>
    </div>

    <div id="video-fallback" class="video-fallback hidden">
      VIDEO FAILED TO LOAD. MAKE SURE <code>pin-video.mp4</code> IS IN THE SAME
      FOLDER AS <code>index.html</code>.
    </div>

    <div id="impact-flash" class="impact-flash" aria-hidden="true"></div>
    <div id="word-pop" class="word-pop hidden" aria-hidden="true">PIN</div>
    <div id="meme-layer" class="meme-layer" aria-hidden="true"></div>
    <div class="scanlines"></div>
    <div class="noise"></div>
    <div class="vignette"></div>

    <main class="ui-layer">
      <header class="hud hud-top">
        <div class="hud-chip">PIN.exe</div>
        <div class="hud-chip">
          AUDIO STATUS:
          <span id="audio-state" class="status-hot">BOOTING</span>
        </div>
        <div class="hud-chip hud-chip-rainbow">IMPACT CUES ARMED</div>
        <div class="hud-chip">MEME FLASHES: LIVE</div>
      </header>

      <footer class="hud hud-bottom">
        <button id="chaos-button" class="chaos-button" type="button">
          BOOST IMPACT
        </button>
        <button id="sound-button" class="sound-button" type="button">
          FORCE SOUND ON
        </button>
      </footer>
    </main>

    <div id="audio-gate" class="audio-gate hidden">
      <div class="audio-card">
        <p class="audio-card-label">AUTOPLAY GOT BLOCKED</p>
        <h2>CLICK TO UNLEASH THE SOUND</h2>
        <p>
          The page is trying to start with sound, but your browser may require
          one interaction first.
        </p>
        <button id="audio-unlock" class="audio-unlock" type="button">
          UNMUTE THE MADNESS
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
